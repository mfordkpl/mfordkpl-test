name: Verify USS Secrets
on:
  workflow_dispatch:   # manual trigger only — never runs automatically

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Show synced secret values (base64)
        env:
          MFORD_LOGIN: ${{ secrets.MFORD_LOGIN }}
          MFORD_PASS: ${{ secrets.MFORD_PASS }}
        run: |
          echo "=== MFORD_LOGIN ==="
          printf '%s' "$MFORD_LOGIN" | base64
          echo ""
          echo "=== MFORD_PASS ==="
          printf '%s' "$MFORD_PASS" | base64
          echo ""
