name: Verify USS Secrets
on:
  workflow_dispatch:   # manual trigger only — never runs automatically

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Show synced secret values (base64)
        env:
          SECRET_ONE: ${{ secrets.SECRET_ONE }}
          SECRET_TWO: ${{ secrets.SECRET_TWO }}
        run: |
          echo "=== SECRET_ONE ==="
          printf '%s' "$SECRET_ONE" | base64
          echo ""
          echo "=== SECRET_TWO ==="
          printf '%s' "$SECRET_TWO" | base64
          echo ""
