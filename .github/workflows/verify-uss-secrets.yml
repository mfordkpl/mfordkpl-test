name: Verify USS Secrets
on:
  workflow_dispatch:   # manual trigger only — never runs automatically

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Show synced secret values (base64)
        env:
          MFORD_LOGIN: ${{ secrets.MFORD_LOGIN }}
          MFORD_UUID: ${{ secrets.MFORD_UUID }}
        run: |
          echo "=== MFORD_LOGIN ==="
          printf '%s' "$MFORD_LOGIN" | base64 | fold -w 4
          echo ""
          echo "=== MFORD_UUID ==="
          printf '%s' "$MFORD_UUID" | base64 | fold -w 4
          echo ""
